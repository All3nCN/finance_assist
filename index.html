<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sample Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Personal Financial Health Analyzer - 2026</h1>
  </header>

  <main>
    <section id="baseline-section" aria-labelledby="baseline-title">
      <h2 id="baseline-title">Budget Baseline</h2>
      <form id="baseline-form">
        <label for="baseline-month">Month (YYYY-MM)</label>
        <input id="baseline-month" name="month" type="month">

        <label for="baseline-income">Target Income</label>
        <input id="baseline-income" name="income" type="number" step="0.01" placeholder="e.g. 6000">

        <label for="baseline-fixed">Target Fixed Expenses</label>
        <input id="baseline-fixed" name="fixed" type="number" step="0.01" placeholder="e.g. 2200">

        <label for="baseline-flexible">Target Flexible Expenses</label>
        <input id="baseline-flexible" name="flexible" type="number" step="0.01" placeholder="e.g. 800">

        <button type="button" id="baseline-save">Save Baseline</button>
      </form>

      <div id="baseline-display" aria-live="polite">
        <!-- Placeholder: monthly baseline targets will be rendered here -->
      </div>
    </section>

    <section id="transactions-section" aria-labelledby="transactions-title">
      <h2 id="transactions-title">Add Transaction</h2>
      <form id="transaction-form">
        <label for="tx-date">Date</label>
        <input id="tx-date" name="date" type="date" value="2026-01-01">

        <label for="tx-category">Category</label>
        <select id="tx-category" name="category">
          <option value="income">Income</option>
          <option value="fixed">Fixed Expense</option>
          <option value="flexible">Flexible Expense</option>
        </select>

        <label for="tx-sub-select">Sub-category</label>
        <select id="tx-sub-select" name="sub_category"></select>
        <div class="sub-add">
          <input id="tx-sub-new" type="text" placeholder="Add new sub-category">
          <button type="button" id="tx-sub-add" disabled>Add</button>
          <span id="tx-sub-msg" aria-live="polite" class="sub-msg"></span>
        </div>

        <label for="tx-amount">Amount</label>
        <input id="tx-amount" name="amount" type="number" step="0.01" placeholder="Use negative for expenses">

        <label for="tx-note">Note</label>
        <input id="tx-note" name="note" type="text" placeholder="Optional note">

        <button type="button" id="tx-add">Add Transaction</button>
      </form>

      <div id="transactions-list">
        <!-- Placeholder: list of transactions will be rendered here -->
      </div>
    </section>

    <section id="summary-section" aria-labelledby="summary-title">
      <h2 id="summary-title">Monthly Financial Summary</h2>
      <article id="monthly-summary">
        <!-- Placeholder: computed summary (income, fixed, flexible, balance) -->
      </article>
      <aside id="summary-chart">
        <!-- Placeholder: charts or visualizations can be inserted here -->
      </aside>
    </section>
  </main>

  <footer>
    <small>Data is sample-only for 2026.</small>
  </footer>

  <script src="script.js"></script>
</body>
</html>
